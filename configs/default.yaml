# Default configuration for continual learning experiments
seed: 42

data:
  type: "synthetic"  # "synthetic" or "digits"
  num_tasks: 5
  batch_size: 32
  kwargs:
    num_samples: 1000
    input_dim: 20
    num_classes: 2
    noise: 0.1

model:
  type: "simple"  # "simple" or "resnet"
  kwargs:
    hidden_dims: [128, 64]
    dropout_rate: 0.2

training:
  learning_rate: 0.001
  weight_decay: 1e-4
  epochs_per_task: 10

method: "ewc"  # "ewc", "l2", "mas", "packnet", "finetune"

# Method-specific parameters
method_params:
  importance_factor: 1000.0  # For EWC and MAS
  lambda_reg: 0.01  # For L2
  prune_ratio: 0.5  # For PackNet
