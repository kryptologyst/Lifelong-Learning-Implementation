# Digits dataset configuration
seed: 42

data:
  type: "digits"
  num_tasks: 5
  batch_size: 32
  kwargs:
    classes_per_task: 2
    test_size: 0.2

model:
  type: "simple"
  kwargs:
    input_dim: 64
    hidden_dims: [128, 64]
    dropout_rate: 0.2

training:
  learning_rate: 0.001
  weight_decay: 1e-4
  epochs_per_task: 20

method: "ewc"

method_params:
  importance_factor: 1000.0
