seed: 42
data:
  type: synthetic
  num_tasks: 5
  batch_size: 32
  kwargs:
    num_samples: 1000
    input_dim: 20
    num_classes: 2
    noise: 0.1
model:
  type: simple
  kwargs:
    hidden_dims:
    - 128
    - 64
    dropout_rate: 0.2
training:
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs_per_task: 10
method: mas
method_params:
  importance_factor: 1000.0
  lambda_reg: 0.01
  prune_ratio: 0.5
